spring.application.name=spring_ai
#ai
spring.ai.openai.api-key=
spring.ai.openai.base-url=https://dashscope.aliyuncs.com/compatible-mode
spring.ai.openai.chat.options.model=qwen-max-latest
spring.ai.openai.chat.options.temperature=0.9
spring.ai.openai.embedding.options.model=text-embedding-v3
spring.ai.openai.embedding.options.dimensions=1024

spring.datasource.url=
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

pdf.storage-dir=./pdfs
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

spring.neo4j.uri=
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=
spring.data.neo4j.database=neo4j


mybatis.configuration.map-underscore-to-camel-case: true

spring.mvc.async.request-timeout=0
